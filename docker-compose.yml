services:
  postgres:
    image: postgres:16-alpine
    container_name: readuls_postgres
    environment:
      POSTGRES_DB: readuls
      POSTGRES_USER: readuls
      POSTGRES_PASSWORD: readuls123
    ports:
      - "5435:5432"
    volumes:
      - readuls_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: readuls_mongo
    ports:
      - "27017:27017"
    volumes:
      - readuls_mongo_data:/data/db
    restart: unless-stopped

volumes:
  readuls_postgres_data:
  readuls_mongo_data:
